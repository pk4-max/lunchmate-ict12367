{% extends 'posts/base.html' %}
{% block content %}
<div style="max-width:560px;margin:0 auto;background:#fff;border:1px solid #ebebeb;border-radius:14px;padding:28px;box-shadow:0 2px 8px rgba(0,0,0,.07)">
  <h2 style="font-family:'Prompt',sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:22px">{{ title }}</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
    <div style="margin-bottom:16px">
      <label style="font-size:.85rem;font-weight:600;color:#555;display:block;margin-bottom:4px;font-family:'Prompt',sans-serif">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}
      <div style="color:#dc2626;font-size:.8rem;margin-top:4px">{{ field.errors }}</div>
      {% endif %}
    </div>
    {% endfor %}
    <div style="display:flex;gap:10px;margin-top:20px">
      <button type="submit" class="btn-cta" style="padding:11px 24px;border-radius:99px;font-family:'Prompt',sans-serif">💾 บันทึก</button>
      <a href="{% url 'feed' %}" style="padding:11px 20px;border-radius:99px;border:1.5px solid #ebebeb;background:#fff;font-family:'Prompt',sans-serif;font-size:.85rem;font-weight:700;color:#555;text-decoration:none;display:inline-flex;align-items:center;">ยกเลิก</a>
    </div>
  </form>
</div>
{% endblock %}
