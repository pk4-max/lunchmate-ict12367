{% extends 'posts/base.html' %}
{% block content %}
<div style="max-width:440px;margin:40px auto;background:#fff;border:1px solid #ebebeb;border-radius:14px;padding:36px 28px;box-shadow:0 2px 8px rgba(0,0,0,.07);text-align:center">
  <div style="font-size:3.5rem;margin-bottom:16px">🗑️</div>
  <h2 style="font-family:'Prompt',sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:10px">ยืนยันการลบ</h2>
  <p style="color:#666;font-size:.92rem;line-height:1.7;margin-bottom:24px">
    คุณแน่ใจว่าต้องการลบโพสต์<br>
    <b style="color:#1a1a1a">{{ post.restaurant }}</b> ใช่มั้ย?<br>
    <span style="color:#dc2626;font-size:.82rem">การกระทำนี้ไม่สามารถย้อนกลับได้</span>
  </p>
  <form method="post">
    {% csrf_token %}
    <div style="display:flex;gap:10px;justify-content:center">
      <button type="submit"
        style="padding:11px 24px;border-radius:99px;background:#dc2626;color:#fff;border:none;font-family:'Prompt',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;">
        🗑️ ลบเลย
      </button>
      <a href="{% url 'feed' %}"
        style="padding:11px 20px;border-radius:99px;border:1.5px solid #ebebeb;background:#fff;font-family:'Prompt',sans-serif;font-size:.85rem;font-weight:700;color:#555;text-decoration:none;display:inline-flex;align-items:center;">
        ยกเลิก
      </a>
    </div>
  </form>
</div>
{% endblock %}
